<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Meu Espaço</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f7ee;--bg2:#eef2e2;--bg3:#e4ebce;
  --card:#ffffff;--card2:#f0f4e4;
  --border:rgba(43,59,28,.10);--border2:rgba(43,59,28,.20);
  --text:#1e2a12;--text2:#4a5e34;--text3:#8a9e74;
  --darkgreen:#2b3b1c;--lime:#d2e67b;--softpink:#ffc3cc;
  --rose:#c94d5e;--amber:#b07a28;--emerald:#2e6e38;
  --sidebar-w:230px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#auth-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100}
#auth-screen.hidden{display:none!important}
.auth-glow{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(210,230,123,.3) 0%,transparent 70%);pointer-events:none}
.auth-card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border2);border-radius:22px;padding:44px;width:380px;max-width:92vw;box-shadow:0 24px 60px rgba(0,0,0,.12)}
.auth-logo{font-family:'Fraunces',serif;font-size:1.9rem;font-weight:700;color:var(--darkgreen);margin-bottom:6px}
.auth-tagline{color:var(--text2);font-size:.87rem;margin-bottom:30px}
.auth-card label{display:block;font-size:.73rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.auth-card input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.92rem;margin-bottom:16px;outline:none;transition:border .2s}
.auth-card input:focus{border-color:var(--darkgreen)}
.btn-auth{width:100%;padding:13px;background:var(--darkgreen);border:none;border-radius:10px;color:var(--lime);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:4px}
.auth-err{color:var(--rose);font-size:.8rem;margin-top:-8px;margin-bottom:12px;display:none}
.setup-screen{position:fixed;inset:0;background:var(--bg);z-index:150;display:flex;align-items:center;justify-content:center}
.setup-card{background:var(--card);border:1px solid var(--border2);border-radius:22px;padding:44px;max-width:440px;width:92vw;text-align:center}
.setup-title{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:700;color:var(--text);margin-bottom:10px}
.setup-sub{color:var(--text2);font-size:.88rem;margin-bottom:26px;line-height:1.6}
.app{display:flex;height:100vh}
.hidden{display:none!important}
.sidebar{width:var(--sidebar-w);background:var(--darkgreen);display:flex;flex-direction:column;padding:18px 0;flex-shrink:0;overflow-y:auto;box-shadow:2px 0 12px rgba(43,59,28,.15);z-index:20;transition:transform .25s}
.sidebar-logo{padding:0 16px 18px;font-family:'Fraunces',serif;font-size:1.25rem;font-weight:700;color:var(--lime)}
.sidebar-logo span{color:rgba(210,230,123,.4);font-size:.68rem;font-family:'DM Sans',sans-serif;font-weight:400;display:block;margin-top:1px}
.nav-section{padding:0 8px;margin-bottom:4px}
.nav-label{font-size:.65rem;font-weight:600;color:rgba(210,230,123,.3);text-transform:uppercase;letter-spacing:.1em;padding:5px 8px 3px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:8px;cursor:pointer;color:rgba(210,230,123,.55);font-size:.83rem;font-weight:400;transition:all .15s;margin-bottom:1px;border-left:2px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.07);color:var(--lime)}
.nav-item.active{background:rgba(210,230,123,.12);color:var(--lime);font-weight:600;border-left-color:var(--lime)}
.nav-dot{width:5px;height:5px;border-radius:50%;background:currentColor;display:inline-block;flex-shrink:0;opacity:.5}
.nav-item.active .nav-dot{opacity:1}
.nav-badge{margin-left:auto;background:var(--lime);color:var(--darkgreen);font-size:.65rem;font-weight:700;padding:2px 6px;border-radius:20px}
.sidebar-footer{margin-top:auto;padding:12px 16px 0;border-top:1px solid rgba(210,230,123,.1)}
.sidebar-user{display:flex;align-items:center;gap:9px;color:rgba(210,230,123,.6);font-size:.82rem}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--lime);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:var(--darkgreen);flex-shrink:0}
.btn-logout{background:none;border:none;color:rgba(210,230,123,.35);cursor:pointer;font-size:.75rem;margin-left:auto;padding:3px 7px;border-radius:5px;transition:color .2s}
.btn-logout:hover{color:var(--lime)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:19}
.sidebar-overlay.show{display:block}
.menu-btn{display:none;background:none;border:none;cursor:pointer;color:var(--text);font-size:1.3rem;padding:4px 8px;line-height:1}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:16px 24px;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.topbar-left{display:flex;align-items:center;gap:10px;min-width:0}
.topbar-left h1{font-family:'Fraunces',serif;font-size:1.35rem;font-weight:700;color:var(--text);white-space:nowrap}
.topbar-left p{color:var(--text2);font-size:.8rem;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:22px 24px}
.btn-primary{background:var(--darkgreen);border:none;border-radius:9px;color:var(--lime);padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:.83rem;font-weight:600;cursor:pointer;transition:opacity .2s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn-primary:hover{opacity:.88}
.btn-secondary{background:var(--card2);border:1px solid var(--border2);border-radius:9px;color:var(--text2);padding:7px 13px;font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-secondary:hover{color:var(--text);border-color:var(--darkgreen)}
.btn-cancel{background:var(--bg3);border:1px solid var(--border);border-radius:9px;color:var(--text2);padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer}
.btn-save{background:var(--darkgreen);border:none;border-radius:9px;color:var(--lime);padding:9px 22px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer}
.btn-icon{background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text2);padding:5px 8px;cursor:pointer;font-size:.78rem;transition:all .15s}
.btn-icon:hover{color:var(--text)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
.card-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:500;color:var(--text);margin-bottom:14px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
.section-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:700;color:var(--text)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;align-items:flex-start;gap:12px}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;background:var(--bg3)}
.stat-n{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:700;color:var(--text);line-height:1}
.stat-l{font-size:.75rem;color:var(--text2);margin-top:3px}
.stat-sub{font-size:.7rem;color:var(--text3);margin-top:1px}
.focus-card{background:linear-gradient(135deg,rgba(210,230,123,.2),rgba(255,195,204,.1));border:1px solid rgba(43,59,28,.15);border-radius:14px;padding:20px;margin-bottom:18px}
.focus-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:700;color:var(--darkgreen);margin-bottom:10px}
.focus-input-row{display:flex;gap:8px}
.focus-input{flex:1;background:rgba(255,255,255,.8);border:1px solid rgba(43,59,28,.2);border-radius:9px;padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;min-width:0}
.focus-input:focus{border-color:var(--darkgreen)}
.tab-row{display:flex;gap:3px;margin-bottom:14px;padding:3px;background:var(--bg3);border-radius:9px}
.tab-btn{flex:1;padding:7px 5px;border:none;border-radius:6px;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .15s}
.tab-btn.active{background:var(--darkgreen);color:var(--lime)}
.task-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-check{width:19px;height:19px;border-radius:5px;border:2px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.task-check.done{background:var(--darkgreen);border-color:var(--darkgreen)}
.task-check.done::after{content:'✓';color:var(--lime);font-size:.65rem;font-weight:700}
.task-text{flex:1;font-size:.87rem;color:var(--text);min-width:0}
.task-text.done{text-decoration:line-through;color:var(--text3)}
.task-date{font-size:.72rem;color:var(--text3);white-space:nowrap;flex-shrink:0}
.task-prio{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.p-alta{background:var(--rose)}.p-media{background:var(--amber)}.p-baixa{background:var(--emerald)}
.task-rec{font-size:.65rem;background:rgba(43,59,28,.08);color:var(--text2);padding:2px 6px;border-radius:10px;flex-shrink:0}
.task-del{background:none;border:none;color:var(--text3);cursor:pointer;opacity:0;font-size:.9rem;padding:3px;flex-shrink:0}
.task-item:hover .task-del{opacity:1}
.add-task-row{display:flex;gap:7px;margin-top:14px}
.add-task-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.84rem;outline:none;min-width:0}
.add-task-input:focus{border-color:var(--darkgreen)}
.btn-add{background:var(--darkgreen);border:none;border-radius:8px;color:var(--lime);padding:8px 13px;cursor:pointer;font-size:.9rem;flex-shrink:0}
.projetos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.projeto-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.projeto-card:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.1)}
.projeto-nome{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:5px;margin-top:6px}
.projeto-desc{font-size:.8rem;color:var(--text2);margin-bottom:14px;line-height:1.5}
.progress-bar-wrap{background:var(--bg3);border-radius:100px;height:5px;margin-bottom:7px}
.progress-bar{height:100%;border-radius:100px;transition:width .4s ease}
.projeto-meta{display:flex;align-items:center;justify-content:space-between;font-size:.75rem;color:var(--text2)}
.projeto-status{padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:600}
.s-ativo{background:rgba(210,230,123,.3);color:#2a5c2f}.s-pausado{background:rgba(255,195,204,.4);color:#8a3040}
.s-concluido{background:rgba(43,59,28,.1);color:var(--darkgreen)}.s-planejado{background:rgba(43,59,28,.06);color:var(--text2)}
.projeto-actions{display:flex;gap:5px;opacity:0;transition:opacity .15s;position:absolute;top:12px;right:12px}
.projeto-card:hover .projeto-actions{opacity:1}
.back-btn{display:flex;align-items:center;gap:5px;color:var(--text2);background:none;border:none;font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;padding:0;margin-bottom:18px}
.back-btn:hover{color:var(--text)}
.projeto-detalhe-grid{display:grid;grid-template-columns:1fr 320px;gap:18px}
.progress-slider{width:100%;-webkit-appearance:none;height:5px;background:var(--bg3);border-radius:100px;outline:none;cursor:pointer;margin-top:12px}
.progress-slider::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;background:var(--darkgreen);cursor:pointer;border:2px solid var(--bg)}
.progress-value{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:700;color:var(--darkgreen)}
.color-picker-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;transition:transform .15s;border:3px solid transparent}
.color-dot:hover{transform:scale(1.15)}
.color-dot.selected{border-color:var(--darkgreen)}

/* ATIVIDADES */
.ativ-bloco{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.ativ-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;transition:background .15s}
.ativ-header:hover{background:var(--bg3)}
.ativ-expand-icon{font-size:.75rem;color:var(--text3);flex-shrink:0;transition:transform .2s;width:14px;text-align:center}
.ativ-expand-icon.open{transform:rotate(90deg)}
.ativ-nome{font-weight:600;font-size:.88rem;color:var(--text);flex:1}
.ativ-prazo-badge{font-size:.68rem;padding:2px 8px;border-radius:10px;background:var(--bg3);color:var(--text2);flex-shrink:0}
.ativ-prazo-badge.vencido{background:rgba(201,77,94,.12);color:var(--rose)}
.ativ-prazo-badge.proximo{background:rgba(176,122,40,.12);color:var(--amber)}
.ativ-progresso-mini{font-size:.68rem;color:var(--text3);flex-shrink:0}
.ativ-del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.82rem;padding:2px 5px;opacity:0;transition:opacity .15s}
.ativ-header:hover .ativ-del-btn{opacity:1}
.ativ-body{padding:0 14px 12px;display:none}
.ativ-body.open{display:block}
.ativ-task-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.ativ-task-row:last-of-type{border-bottom:none}
.ativ-task-check{width:17px;height:17px;border-radius:4px;border:2px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.ativ-task-check.done{background:var(--darkgreen);border-color:var(--darkgreen)}
.ativ-task-check.done::after{content:'✓';color:var(--lime);font-size:.6rem;font-weight:700}
.ativ-task-text{flex:1;font-size:.83rem;color:var(--text)}
.ativ-task-text.done{text-decoration:line-through;color:var(--text3)}
.ativ-task-date{font-size:.68rem;color:var(--text3);white-space:nowrap;flex-shrink:0}
.ativ-task-date.vencido{color:var(--rose);font-weight:600}
.ativ-task-prio{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ativ-task-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.8rem;padding:2px;opacity:0;flex-shrink:0}
.ativ-task-row:hover .ativ-task-del{opacity:1}
.ativ-add-task{display:flex;gap:6px;margin-top:10px}
.ativ-add-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--text);outline:none;min-width:0}
.ativ-add-input:focus{border-color:var(--darkgreen)}
.ativ-add-btn{background:var(--darkgreen);border:none;border-radius:7px;color:var(--lime);padding:7px 11px;cursor:pointer;font-size:.85rem;flex-shrink:0}
.ativ-desc{font-size:.78rem;color:var(--text2);margin-bottom:10px;line-height:1.5}

.kanban{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px}
.kanban-col{background:var(--bg2);border-radius:12px;padding:14px}
.kanban-col-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.kanban-count{background:var(--bg3);border-radius:20px;padding:2px 8px;font-size:.7rem}
.kanban-task{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:8px}
.kanban-task:last-child{margin-bottom:0}
.kanban-task-text{font-size:.85rem;color:var(--text);margin-bottom:5px}
.kanban-task-text.done{text-decoration:line-through;color:var(--text3)}
.ideias-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:13px}
.ideia-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:15px;transition:all .15s}
.ideia-card:hover{border-color:var(--border2)}
.ideia-titulo{font-weight:600;color:var(--text);font-size:.88rem;margin-bottom:5px}
.ideia-body{font-size:.8rem;color:var(--text2);line-height:1.55;white-space:pre-wrap}
.ideia-meta{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.ideia-proj-tag{font-size:.7rem;padding:3px 9px;border-radius:20px;background:rgba(43,59,28,.08);color:var(--darkgreen);font-weight:500}
.ideia-date{font-size:.7rem;color:var(--text3)}
.ideia-del{background:none;border:none;color:var(--text3);cursor:pointer;opacity:0;font-size:.85rem}
.ideia-card:hover .ideia-del{opacity:1}
.filter-row{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.filter-chip{padding:5px 13px;border-radius:20px;background:var(--card);border:1px solid var(--border);color:var(--text2);font-size:.78rem;cursor:pointer;transition:all .15s}
.filter-chip.active{background:var(--darkgreen);border-color:var(--darkgreen);color:var(--lime)}
.cal-wrapper{display:grid;grid-template-columns:300px 1fr;gap:18px}
.cal-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-nav button{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text2);padding:5px 10px;cursor:pointer;font-size:.86rem;transition:all .15s}
.cal-nav button:hover{color:var(--text);border-color:var(--darkgreen)}
.cal-month{font-family:'Fraunces',serif;font-size:.97rem;font-weight:700;color:var(--text);text-align:center;min-width:120px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:.63rem;font-weight:600;color:var(--text3);text-transform:uppercase;padding:5px 0}
.cal-day{aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:.78rem;color:var(--text2);position:relative}
.cal-day:hover{background:var(--bg3);color:var(--text)}
.cal-day.today{background:rgba(210,230,123,.3);color:var(--darkgreen);font-weight:700}
.cal-day.selected{background:var(--darkgreen)!important;color:var(--lime)!important;font-weight:700}
.cal-day.other-month{opacity:.28}
.cal-day.has-event::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--rose)}
.cal-day.selected.has-event::after{background:var(--lime)}
.cal-agenda{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.cal-agenda-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cal-sel-date{font-family:'Fraunces',serif;font-size:.95rem;font-weight:700;color:var(--text)}
.cal-agenda-scroll{max-height:calc(100vh - 200px);overflow-y:auto}
.agenda-day-group{border-bottom:1px solid var(--border)}
.agenda-day-group:last-child{border-bottom:none}
.agenda-day-header{display:flex;align-items:center;gap:12px;padding:12px 18px;background:var(--bg);position:sticky;top:0;z-index:2}
.agenda-day-num{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;color:var(--text);line-height:1;min-width:32px}
.agenda-day-info{flex:1}
.agenda-day-name{font-size:.78rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.agenda-day-full{font-size:.72rem;color:var(--text3)}
.agenda-day-today-badge{background:var(--lime);color:var(--darkgreen);font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0}

// Verifica se prazo está vencido ou próximo (<=3 dias)
function statusPrazo(iso){
  if(!iso)return null;
  const hoje=new Date(isoHoje());
  const prazo=new Date(iso);
  const diff=Math.ceil((prazo-hoje)/(1000*60*60*24));
  if(diff<0)return'vencido';
  if(diff<=3)return'proximo';
  return'ok';
}

async function doLogin(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const err=document.getElementById('auth-err');
  err.style.display='none';
  if(!email||!pass){err.textContent='Preencha todos os campos.';err.style.display='block';return;}
  const{error}=await getSB().auth.signInWithPassword({email,password:pass});
  if(error){err.textContent='Email ou senha incorretos.';err.style.display='block';}
}

  if(_appIniciado)return;
  _appIniciado=true;
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('app').classList.add('hidden');
  try{
    let prof=null;
    try{const{data}=await getSB().from('meu_espaco_perfil').select('*').eq('user_id',session.user.id).maybeSingle();prof=data;}catch(e){}
    if(!prof||!prof.nome){
      // Auto-setup com nome Cauã
      await getSB().from('meu_espaco_perfil').upsert({user_id:session.user.id,nome:'Cauã'},{onConflict:'user_id'});
      prof={nome:'Cauã'};
    }
    document.getElementById('app').classList.remove('hidden');
    await App.init(session,prof);
  }catch(e){console.error(e);_appIniciado=false;document.getElementById('auth-screen').style.display='flex';}
}

  if(el){el.textContent=n;el.classList.toggle('hidden',n===0);}
  if(bn){bn.textContent=n;bn.classList.toggle('hidden',n===0);}
}

function fabAction(){

const App={
  current:'dashboard',
  async init(session,perfil){
    State.user=session.user;State.perfil=perfil;
    await loadAll();this.navigate('dashboard');
  },
  navigate(page){
    this.current=page;closeSidebar();
    if(!document.getElementById('page-content'))return;
    document.querySelectorAll('.nav-item').forEach(i=>i.classList.toggle('active',i.dataset.page===page));
    document.querySelectorAll('.bn-item').forEach(i=>i.classList.toggle('active',i.dataset.page===page));

    const[t,s]=T[page]||[page,''];

};

async function saveFoco(){

  State.foco={texto};toast('Foco salvo!');
}

function renderTaskItem(t){
  const proj=State.projetos.find(p=>p.id===t.projeto_id);
  return`<div class="task-item" id="task-${t.id}">
    <div class="task-check ${t.concluida?'done':''}" onclick="toggleTarefa('${t.id}')"></div>
    <div class="task-prio p-${t.prioridade||'media'}"></div>
    <span class="task-text ${t.concluida?'done':''}">${t.texto}</span>
    ${proj?`<span style="font-size:.68rem;padding:2px 7px;border-radius:10px;background:${proj.cor||'var(--bg3)'};color:var(--text);flex-shrink:0;opacity:.8">${proj.nome}</span>`:''}
    ${t.tipo==='recorrente'&&t.recorrencia_periodo?`<span class="task-rec">a cada ${t.recorrencia_periodo}d</span>`:''}
    ${t.data_vencimento?`<span class="task-date">${brDate(t.data_vencimento)}</span>`:''}
    <button class="task-del" onclick="deletarTarefa('${t.id}')">✕</button>
  </div>`;

function setTab(tipo){State.tarefaTab=tipo;renderTarefas();}

async function toggleTarefa(id){
  const t=State.tarefas.find(x=>x.id===id);if(!t)return;
  const{error}=await getSB().from('meu_espaco_tarefas').update({concluida:!t.concluida}).eq('id',id);
  if(error){toast('Erro','error');return;}
  t.concluida=!t.concluida;updateBadge();
  const el=document.getElementById(`task-${id}`);
  if(el){el.querySelector('.task-check').classList.toggle('done',t.concluida);el.querySelector('.task-text').classList.toggle('done',t.concluida);}
}

async function quickAdd(){
  const inp=document.getElementById('qtask-input');
  const texto=inp.value.trim();if(!texto)return;
  const nova={id:uid(),user_id:State.user.id,texto,tipo:State.tarefaTab,prioridade:'media',concluida:false};
  const{error}=await getSB().from('meu_espaco_tarefas').insert(nova);
  if(error){toast('Erro: '+error.message,'error');return;}
  State.tarefas.push(nova);inp.value='';updateBadge();renderTarefas();
}

async function deletarTarefa(id){
  await getSB().from('meu_espaco_tarefas').delete().eq('id',id);
  State.tarefas=State.tarefas.filter(t=>t.id!==id);updateBadge();renderTarefas();
}

async function limparConcluidas(tipo){
  const ids=State.tarefas.filter(t=>t.concluida&&t.tipo===tipo).map(t=>t.id);
  if(!ids.length)return;
  await getSB().from('meu_espaco_tarefas').delete().in('id',ids);
  State.tarefas=State.tarefas.filter(t=>!(t.concluida&&t.tipo===tipo));
  updateBadge();renderTarefas();
}

          <option value="mensal" ${State.tarefaTab==='mensal'?'selected':''}>Mensal</option>

    </div>
    ${projs?`<div class="form-group"><label class="form-label">Projeto</label><select class="form-select" id="m-t-proj"><option value="">— nenhum —</option>${projs}</select></div>`:''}`,
    `<button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="salvarTarefa('${projetoId||''}')">Adicionar</button>`
  );

function toggleRecField(){
  const v=document.getElementById('m-t-tipo').value;
  const w=document.getElementById('rec-wrap');
  if(w)w.style.display=v==='recorrente'?'block':'none';
}

async function salvarTarefa(projetoId){
  const texto=document.getElementById('m-t-texto').value.trim();
  const tipo=document.getElementById('m-t-tipo').value;
  const prio=document.getElementById('m-t-prio').value;
  const data=document.getElementById('m-t-data').value||null;
  const per=document.getElementById('m-t-periodo')?.value||null;
  const proj=document.getElementById('m-t-proj')?.value||projetoId||null;
  if(!texto){toast('Digite o texto!','error');return;}
  const novaCompleta={id:uid(),user_id:State.user.id,texto,tipo,prioridade:prio,concluida:false,data_vencimento:data,recorrencia_periodo:per?parseInt(per):null,projeto_id:proj||null};
  const novaSimples={id:novaCompleta.id,user_id:State.user.id,texto,tipo,prioridade:prio,concluida:false};
  let{error}=await getSB().from('meu_espaco_tarefas').insert(novaCompleta);
  if(error&&error.message&&error.message.includes('column')){
    const r2=await getSB().from('meu_espaco_tarefas').insert(novaSimples);
    error=r2.error;
    if(!error){State.tarefas.push(novaSimples);}
  } else if(!error){
    State.tarefas.push(novaCompleta);
  }
  if(error){toast('Erro: '+error.message,'error');return;}
  closeModal();updateBadge();
  if(projetoId)renderProjetoDetalhe(projetoId);else renderTarefas();
  toast('Tarefa adicionada!');
}

// =================== ATIVIDADES ===================

function renderAtivBloco(a, projetoId){
  const tarefas=State.ativTarefas.filter(t=>t.atividade_id===a.id);
  const pend=tarefas.filter(t=>!t.concluida);
  const done=tarefas.filter(t=>t.concluida);
  const isOpen=!!State.ativExpanded[a.id];
  const sp=statusPrazo(a.data_prazo);
  const prazoCls=sp==='vencido'?'vencido':sp==='proximo'?'proximo':'';
  const prazoLabel=a.data_prazo?brDate(a.data_prazo):'sem prazo';

  return`<div class="ativ-bloco" id="ativ-${a.id}">
    <div class="ativ-header" onclick="toggleAtiv('${a.id}')">
      <span class="ativ-expand-icon ${isOpen?'open':''}">▶</span>
      <div style="flex:1;min-width:0">
        <div class="ativ-nome">${a.nome}</div>
        ${a.descricao?`<div style="font-size:.73rem;color:var(--text3);margin-top:1px">${a.descricao}</div>`:''}
      </div>
      <span class="ativ-progresso-mini">${done.length}/${tarefas.length}</span>
      <span class="ativ-prazo-badge ${prazoCls}">📅 ${prazoLabel}</span>
      <button class="btn-icon" style="font-size:.73rem;padding:3px 7px" onclick="event.stopPropagation();editarAtividade('${a.id}')">✏</button>
      <button class="ativ-del-btn" onclick="event.stopPropagation();deletarAtividade('${a.id}','${projetoId}')">✕</button>
    </div>
    <div class="ativ-body ${isOpen?'open':''}" id="ativbody-${a.id}">
      ${pend.map(t=>renderAtivTarefa(t,projetoId)).join('')}
      ${done.length>0?`
        <div style="font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:8px 0 4px;margin-top:4px;border-top:1px solid var(--border)">Concluídas (${done.length})</div>
        ${done.map(t=>renderAtivTarefa(t,projetoId)).join('')}
      `:''}
      ${pend.length===0&&done.length===0?`<div style="font-size:.78rem;color:var(--text3);padding:4px 0 8px">Nenhuma tarefa. Adicione abaixo!</div>`:''}
      <div class="ativ-add-task">
        <input class="ativ-add-input" id="atinput-${a.id}" placeholder="Nova tarefa... (Enter)" onkeydown="if(event.key==='Enter')quickAddAtivTarefa('${a.id}','${projetoId}')">
        <input type="date" class="ativ-add-input" id="atdate-${a.id}" style="width:130px;flex:none" title="Prazo da tarefa">
        <button class="ativ-add-btn" onclick="quickAddAtivTarefa('${a.id}','${projetoId}')">+</button>
      </div>
    </div>
  </div>`;
}

function renderAtivTarefa(t, projetoId){
  const sp=statusPrazo(t.data_vencimento);
  const dateCls=sp==='vencido'?'vencido':sp==='proximo'?'proximo':'';
  return`<div class="ativ-task-row" id="ativt-${t.id}">
    <div class="ativ-task-check ${t.concluida?'done':''}" onclick="toggleAtivTarefa('${t.id}','${projetoId}')"></div>
    <div class="ativ-task-prio p-${t.prioridade||'media'}"></div>
    <span class="ativ-task-text ${t.concluida?'done':''}">${t.texto}</span>
    ${t.data_vencimento?`<span class="ativ-task-date ${dateCls}">${brDate(t.data_vencimento)}</span>`:''}
    <button class="ativ-task-del" onclick="deletarAtivTarefa('${t.id}','${projetoId}')">✕</button>
  </div>`;
}

function toggleAtiv(id){
  State.ativExpanded[id]=!State.ativExpanded[id];
  const header=document.querySelector(`#ativ-${id} .ativ-expand-icon`);
  const body=document.getElementById('ativbody-'+id);
  if(header)header.classList.toggle('open',State.ativExpanded[id]);
  if(body)body.classList.toggle('open',State.ativExpanded[id]);
}

function modalNovaAtividade(projetoId){
  openModal('Nova atividade','',
    `<div class="form-group"><label class="form-label">Nome da atividade</label><input type="text" class="form-input" id="m-a-nome" placeholder="Ex: Pesquisa inicial, Design, etc."></div>
    <div class="form-group"><label class="form-label">Descrição (opcional)</label><input type="text" class="form-input" id="m-a-desc" placeholder="Breve descrição..."></div>
    <div class="form-group"><label class="form-label">Prazo da atividade</label><input type="date" class="form-input" id="m-a-prazo"></div>`,
    `<button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="salvarNovaAtividade('${projetoId}')">Criar</button>`
  );
}

async function salvarNovaAtividade(projetoId){
  const nome=document.getElementById('m-a-nome').value.trim();
  const desc=document.getElementById('m-a-desc').value.trim()||null;
  const prazo=document.getElementById('m-a-prazo').value||null;
  if(!nome){toast('Digite o nome!','error');return;}
  const nova={id:uid(),user_id:State.user.id,projeto_id:projetoId,nome,descricao:desc,data_prazo:prazo,created_at:new Date().toISOString()};
  const{error}=await getSB().from('meu_espaco_atividades').insert(nova);
  if(error){toast('Erro: '+error.message,'error');return;}
  State.atividades.push(nova);
  State.ativExpanded[nova.id]=true;
  closeModal();renderProjetoDetalhe(projetoId);toast('Atividade criada!');
}

function editarAtividade(id){
  const a=State.atividades.find(x=>x.id===id);if(!a)return;
  openModal('Editar atividade','',
    `<div class="form-group"><label class="form-label">Nome</label><input type="text" class="form-input" id="m-a-nome" value="${a.nome}"></div>
    <div class="form-group"><label class="form-label">Descrição</label><input type="text" class="form-input" id="m-a-desc" value="${a.descricao||''}"></div>
    <div class="form-group"><label class="form-label">Prazo</label><input type="date" class="form-input" id="m-a-prazo" value="${a.data_prazo||''}"></div>`,
    `<button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="salvarEdicaoAtividade('${id}')">Salvar</button>`
  );
}

async function salvarEdicaoAtividade(id){
  const a=State.atividades.find(x=>x.id===id);if(!a)return;
  const nome=document.getElementById('m-a-nome').value.trim();
  const desc=document.getElementById('m-a-desc').value.trim()||null;
  const prazo=document.getElementById('m-a-prazo').value||null;
  if(!nome){toast('Digite o nome!','error');return;}
  const{error}=await getSB().from('meu_espaco_atividades').update({nome,descricao:desc,data_prazo:prazo}).eq('id',id);
  if(error){toast('Erro','error');return;}
  Object.assign(a,{nome,descricao:desc,data_prazo:prazo});
  closeModal();renderProjetoDetalhe(a.projeto_id);toast('Atividade atualizada!');
}

async function deletarAtividade(id,projetoId){
  if(!confirm('Deletar esta atividade e todas as suas tarefas?'))return;
  await getSB().from('meu_espaco_ativ_tarefas').delete().eq('atividade_id',id);
  await getSB().from('meu_espaco_atividades').delete().eq('id',id);
  State.atividades=State.atividades.filter(a=>a.id!==id);
  State.ativTarefas=State.ativTarefas.filter(t=>t.atividade_id!==id);
  renderProjetoDetalhe(projetoId);toast('Atividade removida.');
}

async function quickAddAtivTarefa(ativId, projetoId){
  const inp=document.getElementById('atinput-'+ativId);
  const dateInp=document.getElementById('atdate-'+ativId);
  const texto=inp?.value?.trim();if(!texto)return;
  const prazo=dateInp?.value||null;
  const nova={id:uid(),user_id:State.user.id,atividade_id:ativId,texto,prioridade:'media',concluida:false,data_vencimento:prazo,created_at:new Date().toISOString()};
  const{error}=await getSB().from('meu_espaco_ativ_tarefas').insert(nova);
  if(error){toast('Erro: '+error.message,'error');return;}
  State.ativTarefas.push(nova);
  if(inp)inp.value='';if(dateInp)dateInp.value='';
  State.ativExpanded[ativId]=true;
  renderProjetoDetalhe(projetoId);toast('Tarefa adicionada!');
}

async function toggleAtivTarefa(id, projetoId){
  const t=State.ativTarefas.find(x=>x.id===id);if(!t)return;
  const{error}=await getSB().from('meu_espaco_ativ_tarefas').update({concluida:!t.concluida}).eq('id',id);
  if(error){toast('Erro','error');return;}
  t.concluida=!t.concluida;
  // Atualiza inline sem re-render completo
  const row=document.getElementById('ativt-'+id);
  if(row){
    const check=row.querySelector('.ativ-task-check');
    const txt=row.querySelector('.ativ-task-text');
    if(check)check.classList.toggle('done',t.concluida);
    if(txt)txt.classList.toggle('done',t.concluida);
  }
  // Re-render do bloco de atividade para mover para concluídas
  const a=State.atividades.find(x=>x.id===t.atividade_id);
  if(a){
    const bloco=document.getElementById('ativ-'+a.id);
    if(bloco){
      const novoHtml=renderAtivBloco(a,projetoId);
      const tmp=document.createElement('div');tmp.innerHTML=novoHtml;
      bloco.replaceWith(tmp.firstChild);
    }
  }
}

async function deletarAtivTarefa(id, projetoId){
  await getSB().from('meu_espaco_ativ_tarefas').delete().eq('id',id);
  State.ativTarefas=State.ativTarefas.filter(t=>t.id!==id);
  renderProjetoDetalhe(projetoId);
}

async function deletarProjeto(id){
  if(!confirm('Deletar este projeto?'))return;
  await getSB().from('meu_espaco_ativ_tarefas').delete().in('atividade_id',State.atividades.filter(a=>a.projeto_id===id).map(a=>a.id));
  await getSB().from('meu_espaco_atividades').delete().eq('projeto_id',id);
  await getSB().from('meu_espaco_tarefas').delete().eq('projeto_id',id);
  await getSB().from('meu_espaco_ideias').delete().eq('projeto_id',id);
  await getSB().from('meu_espaco_projetos').delete().eq('id',id);
  State.projetos=State.projetos.filter(x=>x.id!==id);
  State.atividades=State.atividades.filter(a=>a.projeto_id!==id);
  State.ativTarefas=State.ativTarefas.filter(t=>!State.atividades.some(a=>a.id===t.atividade_id));
  State.tarefas=State.tarefas.filter(t=>t.projeto_id!==id);
  State.ideias=State.ideias.filter(i=>i.projeto_id!==id);
  State.projetoAtual=null;renderProjetos();toast('Projeto deletado.');
}

// IDEIAS
function renderIdeias(){
  const c=document.getElementById('page-content');
  document.getElementById('topbar-actions').innerHTML=`<button class="btn-primary" onclick="modalNovaIdeia()">+ Nova ideia</button>`;
  const filtro=State.ideiasFilter;
  const lista=filtro==='todos'?State.ideias:State.ideias.filter(i=>i.projeto_id===filtro);
  const chips=[{id:'todos',label:'Todas'},...State.projetos.map(p=>({id:p.id,label:p.nome}))];
  c.innerHTML=`
  <div class="filter-row">${chips.map(ch=>`<div class="filter-chip ${filtro===ch.id?'active':''}" onclick="State.ideiasFilter='${ch.id}';renderIdeias()">${ch.label}</div>`).join('')}</div>
  ${lista.length===0?`<div class="empty-state" style="padding:60px"><p>Nenhuma ideia ainda.</p></div>`:
    `<div class="ideias-grid">${lista.map(i=>{
      const proj=State.projetos.find(p=>p.id===i.projeto_id);
      return`<div class="ideia-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px">
          <div class="ideia-titulo">${i.titulo}</div>
          <button class="ideia-del" style="opacity:1" onclick="deletarIdeia('${i.id}')">✕</button>
        </div>
        <div class="ideia-body">${i.conteudo||''}</div>
        <div class="ideia-meta">${proj?`<span class="ideia-proj-tag">${proj.nome}</span>`:'<span></span>'}<span class="ideia-date">${brDate(i.created_at?.slice(0,10))}</span></div>
      </div>`;
    }).join('')}</div>`}`;
}

function modalNovaIdeia(projetoId){
  const projs=State.projetos.map(p=>`<option value="${p.id}" ${p.id===projetoId?'selected':''}>${p.nome}</option>`).join('');
  openModal('Nova ideia','',
    `<div class="form-group"><label class="form-label">Título</label><input type="text" class="form-input" id="m-i-titulo" placeholder="Resumo da ideia..."></div>
    <div class="form-group"><label class="form-label">Conteúdo</label><textarea class="form-textarea" id="m-i-body" placeholder="Detalhe..." style="min-height:100px"></textarea></div>
    ${projs?`<div class="form-group"><label class="form-label">Projeto</label><select class="form-select" id="m-i-proj"><option value="">— nenhum —</option>${projs}</select></div>`:''}`,
    `<button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="salvarIdeia('${projetoId||''}')">Salvar</button>`
  );
}

async function salvarIdeia(projetoId){
  const titulo=document.getElementById('m-i-titulo').value.trim();
  const cont=document.getElementById('m-i-body').value.trim();
  const proj=document.getElementById('m-i-proj')?.value||projetoId||null;
  if(!titulo){toast('Digite o título!','error');return;}
  const nova={id:uid(),user_id:State.user.id,titulo,conteudo:cont,projeto_id:proj||null,created_at:new Date().toISOString()};
  const{error}=await getSB().from('meu_espaco_ideias').insert(nova);
  if(error){toast('Erro: '+error.message,'error');return;}
  State.ideias.unshift(nova);closeModal();
  if(State.projetoAtual)renderProjetoDetalhe(State.projetoAtual);else renderIdeias();
  toast('Ideia salva!');
}

async function deletarIdeia(id){
  await getSB().from('meu_espaco_ideias').delete().eq('id',id);
  State.ideias=State.ideias.filter(i=>i.id!==id);
  if(State.projetoAtual)renderProjetoDetalhe(State.projetoAtual);else renderIdeias();
}

// CALENDÁRIO
function renderCalendario(){
  const c=document.getElementById('page-content');
  document.getElementById('topbar-actions').innerHTML=`<button class="btn-primary" onclick="modalNovoEvento()">+ Evento</button>`;
  const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const DOWS_SHORT=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const DOWS_FULL=['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
  const{calMes:mes,calAno:ano,calDiaSel}=State;
  const hoje=isoHoje();
  const primDia=new Date(ano,mes,1).getDay();
  const totalDias=new Date(ano,mes+1,0).getDate();
  const prevTotal=new Date(ano,mes,0).getDate();
  const diasComEv=new Set(State.eventos.filter(e=>{const d=new Date(e.data+'T12:00:00');return d.getMonth()===mes&&d.getFullYear()===ano}).map(e=>e.data));

  let cells='';
  for(let i=0;i<primDia;i++)cells+=`<div class="cal-day other-month">${prevTotal-primDia+i+1}</div>`;
  for(let d=1;d<=totalDias;d++){
    const iso=`${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls=[iso===hoje?'today':'',iso===calDiaSel?'selected':'',diasComEv.has(iso)?'has-event':''].filter(Boolean).join(' ');
    cells+=`<div class="cal-day ${cls}" onclick="selDia('${iso}')">${d}</div>`;
  }
  const resto=(primDia+totalDias)%7;
  if(resto!==0)for(let d=1;d<=7-resto;d++)cells+=`<div class="cal-day other-month">${d}</div>`;

  const dataFim=new Date();dataFim.setDate(dataFim.getDate()+60);
  const dataFimISO=dataFim.toISOString().slice(0,10);
  const evsFuturos=State.eventos.filter(e=>e.data>=hoje&&e.data<=dataFimISO).sort((a,b)=>a.data.localeCompare(b.data)||(a.horario||'99:99').localeCompare(b.horario||'99:99'));

  const grupos={};
  evsFuturos.forEach(e=>{if(!grupos[e.data])grupos[e.data]=[];grupos[e.data].push(e);});
  for(let i=0;i<7;i++){
    const d=new Date();d.setDate(d.getDate()+i);
    const iso=d.toISOString().slice(0,10);
    if(!grupos[iso])grupos[iso]=[];
  }

  const diasOrdenados=Object.keys(grupos).sort();

  const agendaHTML=diasOrdenados.length===0
    ?`<div class="empty-state" style="padding:40px"><p>Nenhum evento nos próximos 60 dias.</p></div>`
    :diasOrdenados.map(iso=>{
      const d=new Date(iso+'T12:00:00');
      const ehHoje=iso===hoje;
      const nomeD=DOWS_FULL[d.getDay()];
      const mesNome=d.toLocaleDateString('pt-BR',{month:'long'});
      const evs=grupos[iso];
      return`<div class="agenda-day-group">
        <div class="agenda-day-header">
          <div class="agenda-day-num" style="${ehHoje?'color:var(--darkgreen)':''}">${d.getDate()}</div>
          <div class="agenda-day-info">
            <div class="agenda-day-name">${nomeD}</div>
            <div class="agenda-day-full">${mesNome} ${d.getFullYear()}</div>
          </div>
          ${ehHoje?`<div class="agenda-day-today-badge">Hoje</div>`:''}
          <button class="btn-secondary" style="font-size:.7rem;padding:4px 8px;margin-left:auto" onclick="modalNovoEvento('${iso}')">+</button>
        </div>
        ${evs.length===0
          ?`<div class="agenda-empty-day">Sem eventos</div>`
          :evs.map(e=>`
        <div class="agenda-event-row">
          <div class="agenda-event-time-col">
            <div class="agenda-event-time-txt">${e.horario||''}</div>
            <div class="agenda-event-dot" style="color:${e.cor||'var(--darkgreen)'}"></div>
          </div>
          <div class="agenda-event-card" style="border-left-color:${e.cor||'var(--darkgreen)'}">
            <div style="flex:1">
              <div class="agenda-event-nome">${e.titulo}</div>
              ${e.descricao?`<div class="agenda-event-desc">${e.descricao}</div>`:''}
            </div>
            <button class="agenda-event-del" id="evdel-${e.id}">✕</button>
          </div>
        </div>`).join('')}
      </div>`;
    }).join('');

  c.innerHTML=`
  <div class="cal-wrapper">
    <div>
      <div class="cal-card">
        <div class="cal-header">
          <div class="cal-nav">
            <button onclick="navCal(-1)">←</button>
            <div class="cal-month">${MESES[mes]} ${ano}</div>
            <button onclick="navCal(1)">→</button>
          </div>
          <button class="btn-secondary" style="font-size:.72rem;padding:4px 9px" onclick="State.calMes=new Date().getMonth();State.calAno=new Date().getFullYear();State.calDiaSel=isoHoje();renderCalendario()">Hoje</button>
        </div>
        <div class="cal-grid">
          ${DOWS_SHORT.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
          ${cells}
        </div>
      </div>
    </div>
    <div class="cal-agenda">
      <div class="cal-agenda-header">
        <div class="cal-sel-date">Próximos eventos</div>
      </div>
      <div class="cal-agenda-scroll">${agendaHTML}</div>
    </div>
  </div>`;

  State.eventos.forEach(e=>{
    const btn=document.getElementById('evdel-'+e.id);
    if(btn)btn.onclick=ev=>{ev.stopPropagation();deletarEvento(e.id);};
  });
}

function selDia(iso){State.calDiaSel=iso;renderCalendario();}
function navCal(dir){
  State.calMes+=dir;
  if(State.calMes<0){State.calMes=11;State.calAno--;}
  if(State.calMes>11){State.calMes=0;State.calAno++;}
  renderCalendario();
}

function modalNovoEvento(data){
  const COR_EV=['#2b3b1c','#c94d5e','#b07a28','#2e6e38','#3a7080','#7c5cbf'];
  openModal('Novo evento','',
    `<div class="form-group"><label class="form-label">Título</label><input type="text" class="form-input" id="m-ev-titulo" placeholder="Nome do evento..."></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Data</label><input type="date" class="form-input" id="m-ev-data" value="${data||State.calDiaSel}"></div>
      <div class="form-group"><label class="form-label">Horário</label><input type="time" class="form-input" id="m-ev-hora"></div>
    </div>
    <div class="form-group"><label class="form-label">Descrição</label><textarea class="form-textarea" id="m-ev-desc" placeholder="Detalhes..." style="min-height:60px"></textarea></div>
    <div class="form-group"><label class="form-label">Cor</label>
      <div class="color-picker-row" id="color-picker">${COR_EV.map((cor,i)=>`<div class="color-dot ${i===0?'selected':''}" style="background:${cor}" onclick="selecionarCor('${cor}',this)"></div>`).join('')}</div>
    </div>
    <input type="hidden" id="m-p-cor" value="${COR_EV[0]}">`,
    `<button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="salvarEvento()">Salvar</button>`
  );
}

async function salvarEvento(){
  const titulo=document.getElementById('m-ev-titulo').value.trim();
  const data=document.getElementById('m-ev-data').value;
  const hora=document.getElementById('m-ev-hora').value||null;
  const desc=document.getElementById('m-ev-desc').value.trim()||null;
  const cor=document.getElementById('m-p-cor').value;
  if(!titulo||!data){toast('Título e data obrigatórios!','error');return;}
  const novo={id:uid(),user_id:State.user.id,titulo,data,horario:hora,descricao:desc,cor};
  const{error}=await getSB().from('meu_espaco_eventos').insert(novo);
  if(error){toast('Erro: '+error.message,'error');return;}
  State.eventos.push(novo);
  State.calDiaSel=data;State.calMes=parseInt(data.split('-')[1])-1;State.calAno=parseInt(data.split('-')[0]);
  closeModal();renderCalendario();toast('Evento salvo!');
}

async function deletarEvento(id){
  await getSB().from('meu_espaco_eventos').delete().eq('id',id);
  State.eventos=State.eventos.filter(e=>e.id!==id);renderCalendario();
}

// WISHLIST
const CAT_MAP={desejo:{cls:'cat-desejo',label:'Desejo'},necessidade:{cls:'cat-necessidade',label:'Necessidade'},estudo:{cls:'cat-estudo',label:'Estudo'},casa:{cls:'cat-casa',label:'Casa'},outro:{cls:'cat-outro',label:'Outro'}};

function renderWishlist(){
  const c=document.getElementById('page-content');
  document.getElementById('topbar-actions').innerHTML=`<button class="btn-primary" onclick="modalNovaWish()">+ Adicionar</button>`;
  const filtro=State.wishFilter;
  const lista=filtro==='todos'?State.compras:filtro==='compradas'?State.compras.filter(x=>x.comprada):State.compras.filter(x=>x.categoria===filtro&&!x.comprada);
  const pend=State.compras.filter(x=>!x.comprada);
  const done=State.compras.filter(x=>x.comprada);
  const total=pend.reduce((s,x)=>s+(parseFloat(x.preco)||0),0);
  const chips=[{id:'todos',label:'Todos'},...Object.entries(CAT_MAP).map(([k,v])=>({id:k,label:v.label})),{id:'compradas',label:'Comprados'}];

  c.innerHTML=`
  <div class="wish-kpis">
    <div class="wish-kpi"><div class="wish-kpi-n">${pend.length}</div><div class="wish-kpi-l">na lista</div></div>
    <div class="wish-kpi"><div class="wish-kpi-n">${done.length}</div><div class="wish-kpi-l">comprados</div></div>
    ${total>0?`<div class="wish-kpi"><div class="wish-kpi-n">R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div><div class="wish-kpi-l">estimado</div></div>`:''}
  </div>
  <div class="filter-row">${chips.map(ch=>`<div class="filter-chip ${filtro===ch.id?'active':''}" onclick="State.wishFilter='${ch.id}';renderWishlist()">${ch.label}</div>`).join('')}</div>
  ${lista.length===0?`<div class="empty-state" style="padding:60px"><p>Nenhum item aqui.</p></div>`:
    `<div class="wish-grid">${lista.map(item=>renderWishCard(item)).join('')}</div>`}`;

  bindWishEvents();
}

function renderWishCard(item){
  const id=item.id;
  const cat=CAT_MAP[item.categoria]||CAT_MAP.outro;
  return`<div class="wish-card ${item.comprada?'comprada':''}" id="wish-${item.id}">
    <button class="wish-del" id="wdel-${id}">✕</button>
    ${item.comprada?`<div class="wish-check">✓</div>`:''}
    <div class="wish-img-wrap">
      ${item.imagem_url?`<img class="wish-img" src="${item.imagem_url}" alt="${item.nome}" onerror="this.parentElement.innerHTML='<div class=wish-img-ph>◻</div>'">`:`<div class="wish-img-ph">◻</div>`}
    </div>
    <div class="wish-body">
      <div class="wish-nome" title="${item.nome}">${item.nome}</div>
      ${item.preco?`<div class="wish-preco">R$ ${parseFloat(item.preco).toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>`:''}
      ${item.nota?`<div class="wish-nota">${item.nota}</div>`:''}
      <div class="wish-footer">
        <span class="wish-cat ${cat.cls}">${cat.label}</span>
        <button class="btn-comprada" id="wbuy-${id}">${item.comprada?'↩ Desfazer':'Comprei!'}</button>
      </div>
      ${item.link?`<a class="wish-link" href="${item.link}" target="_blank" rel="noopener">Ver produto →</a>`:''}
    </div>
  </div>`;
}

function bindWishEvents(){
  State.compras.forEach(item=>{
    const d=document.getElementById('wdel-'+item.id);
    const b=document.getElementById('wbuy-'+item.id);
    if(d)d.onclick=e=>{e.preventDefault();deletarWish(item.id);};
    if(b)b.onclick=e=>{e.preventDefault();toggleWish(item.id);};
  });
}

function modalNovaWish(){
  openModal('Novo item','',
    `<div class="form-group"><label class="form-label">Nome *</label><input type="text" class="form-input" id="m-w-nome" placeholder="Ex: Tênis Nike..."></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Preço estimado</label><input type="number" class="form-input" id="m-w-preco" placeholder="0,00" step="0.01" min="0"></div>
      <div class="form-group"><label class="form-label">Categoria</label><select class="form-select" id="m-w-cat">${Object.entries(CAT_MAP).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('')}</select></div>
    </div>
    <div class="form-group"><label class="form-label">Link do produto</label><input type="url" class="form-input" id="m-w-link" placeholder="https://..."></div>
    <div class="form-group"><label class="form-label">URL da imagem</label>
      <input type="url" class="form-input" id="m-w-img" placeholder="Clique direito na foto → copiar endereço da imagem" oninput="prevWishImg(this.value)">
      <div id="w-preview" style="display:none;margin-top:8px"><img id="w-preview-img" style="width:100%;max-height:140px;object-fit:contain;border-radius:8px;background:var(--bg3);padding:6px" src="" onerror="document.getElementById('w-preview').style.display='none'"></div>
    </div>
    <div class="form-group"><label class="form-label">Nota</label><textarea class="form-textarea" id="m-w-nota" placeholder="Por que quer comprar?" style="min-height:55px"></textarea></div>`,
    `<button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="salvarWish()">Adicionar</button>`
  );
}

function prevWishImg(url){
  const w=document.getElementById('w-preview');const i=document.getElementById('w-preview-img');
  if(url&&url.startsWith('http')){i.src=url;w.style.display='block';}else{w.style.display='none';}
}

async function salvarWish(){
  const nome=document.getElementById('m-w-nome').value.trim();
  const preco=document.getElementById('m-w-preco').value||null;
  const cat=document.getElementById('m-w-cat').value;
  const link=document.getElementById('m-w-link').value.trim()||null;
  const img=document.getElementById('m-w-img').value.trim()||null;
  const nota=document.getElementById('m-w-nota').value.trim()||null;
  if(!nome){toast('Digite o nome!','error');return;}
  const novo={id:uid(),user_id:State.user.id,nome,preco:preco?parseFloat(preco):null,categoria:cat,link,imagem_url:img,nota,comprada:false,created_at:new Date().toISOString()};
  const{error}=await getSB().from('meu_espaco_compras').insert(novo);
  if(error){toast('Erro: '+error.message,'error');return;}
  State.compras.unshift(novo);closeModal();renderWishlist();toast('Item adicionado!');
}

async function toggleWish(id){
  const item=State.compras.find(x=>x.id===id);if(!item)return;
  const{error}=await getSB().from('meu_espaco_compras').update({comprada:!item.comprada}).eq('id',id);
  if(error){toast('Erro','error');return;}
  item.comprada=!item.comprada;toast(item.comprada?'Comprado!':'De volta à lista');renderWishlist();
}

async function deletarWish(id){
  await getSB().from('meu_espaco_compras').delete().eq('id',id);
  State.compras=State.compras.filter(x=>x.id!==id);renderWishlist();toast('Item removido.');
}
</script>
